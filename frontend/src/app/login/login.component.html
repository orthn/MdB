<div class="container d-flex justify-content-center pt-5" data-bs-theme="dark">
  <div class="card shadow border-0 text-white bg-dark" style="width: 100%; max-width: 450px;">
    <div class="card-body p-4">
      <h4 class="text-center mb-4">Login</h4>

      <form [formGroup]="login" (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <div class="input-group">
            <span class="input-group-text bg-secondary border-0 text-white">
              <fa-icon [icon]="faEnvelope"></fa-icon>
            </span>
            <input
              type="text"
              formControlName="username"
              class="form-control bg-dark border-0 text-white"
              placeholder="Username"
              required>
          </div>
        </div>

        <div class="mb-3">
          <div class="input-group">
            <span class="input-group-text bg-secondary border-0 text-white">
              <fa-icon [icon]="faLock"></fa-icon>
            </span>
            <input
              type="password"
              formControlName="password"
              class="form-control bg-dark border-0 text-white"
              placeholder="Password"
              required>
          </div>
        </div>

        <div *ngIf="httpError" class="alert alert-danger mt-2">
          Login fehlgeschlagen
        </div>

        <button type="submit" class="btn btn-primary w-100 mt-2">Login</button>
      </form>
    </div>
  </div>
</div>
