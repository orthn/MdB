<app-breadcrumb [breadcrumbs]="[
  { label: 'Home', url: '/home' },
  { label: 'Dashboard', url: '/dashboard'},
  { label: 'Bearbeiten'}
]"></app-breadcrumb>

<div *ngIf="httpError" class="alert alert-danger">
  Fehler beim speichern des Studenten.
</div>

<div *ngIf="!user?._id && !httpError" class="text-muted">
  Es ist kein User ausgewählt!
</div>

<div class="d-flex justify-content-between align-items-center">
  <h2 class="text-white">Schüler bearbeiten</h2>
  <div class="d-flex gap-2">
    <button class="btn btn-danger" routerLink="/dashboard">
      <fa-icon [icon]="icons.ARROW_LEFT" class="me-2"></fa-icon>
      <span>Back</span>
    </button>
    <button class="btn btn-primary" (click)="save()" [disabled]="saving">
      <fa-icon [icon]="icons.FLOPPY_DISK" class="me-2"></fa-icon>
      <span>Save</span>
    </button>
  </div>
</div>

<div class="row mt-3 g-5 mb-5 bg-body-tertiary px-4 py-5 rounded-2 shadow">
  <form class="mt-0">
    <div class="text-white row g-3">
      <div class=" col-lg-12 col-sm-12">
        <label class="form-label">Vorname</label>
        <input type="text" class="form-control" [(ngModel)]="user.firstName" name="firstName" placeholder="Vorname">
      </div>

      <div class=" col-lg-12 col-sm-12">
        <label class="form-label">Nachname</label>
        <input type="text" class="form-control" [(ngModel)]="user.lastName" name="lastName" placeholder="Nachname">
      </div>

      <div class="col-lg-12 col-sm-12">
        <label class="form-label">Geschlecht</label>
        <select class="form-select" [(ngModel)]="user.gender" name="gender">
          <option value="male" selected>Männlich</option>
          <option value="female">Weiblich</option>
        </select>
      </div>
    </div>
  </form>
</div>
