<app-breadcrumb [breadcrumbs]="[
  { label: 'Home', url: '/home' },
  { label: 'Dashboard', url: '/dashboard'},
  { label: 'Erstellen'}
]"></app-breadcrumb>

<div class="d-flex justify-content-between align-items-center">
  <h2 class="text-white">Klasse anlegen</h2>
  <div class="d-flex gap-2">
    <button class="btn btn-danger" routerLink="/dashboard">
      <fa-icon [icon]="icons.ARROW_LEFT" class="me-2"></fa-icon>
      <span>Zurück</span>
    </button>
    <button class="btn btn-primary" (click)="createClass()">
      <fa-icon [icon]="icons.FLOPPY_DISK" class="me-2"></fa-icon>
      <span>Speichern</span>
    </button>
  </div>
</div>

<div class="row mt-3 g-5 mb-5 bg-body-tertiary px-4 py-5 rounded-2 shadow">
  <form class="mt-0">
    <div class="text-white row g-3">
      <div class=" col-lg-12 col-sm-12">
        <label class="form-label">Klasse</label>
        <input type="text" class="form-control" [(ngModel)]="course.name" name="className" placeholder="Klassenname">
      </div>

      <div class=" col-lg-12 col-sm-12">
        <label class="form-label">Nachname</label>
        <input type="text" class="form-control" [(ngModel)]="course.description" name="classDescription" placeholder="Beschreibung">
      </div>

      <div class="col-lg-12 col-sm-12">
        <label class="form-label">Schüler hinzufügen</label>
        <select class="form-select" [(ngModel)]="course.students" name="students" multiple>
          <option *ngFor="let student of students" [value]="student">
            {{ student.firstName }} {{ student.lastName }}
          </option>
        </select>
      </div>
    </div>
  </form>
</div>
