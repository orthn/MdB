<app-breadcrumb [breadcrumbs]="[
  { label: 'Dashboard', url: '/home' },
  { label: 'Level' }
]"></app-breadcrumb>

<div *ngIf="loading" class="text-muted">
  Lade Level...
</div>

<div *ngIf="!loading && level" class="level-layout text-white">
  <!-- HEADER -->
  <section class="level-header">
    <div class="header-main">
      <div class="header-text">
        <h2 class="title">{{ level.title }}</h2>
        <p class="description">
          Deine Aufgabe: {{ level.description }}
        </p>
      </div>

      <span class="difficulty" [ngClass]="level.difficulty">
        <ng-container *ngIf="level.difficulty === 'easy'">LEICHT</ng-container>
        <ng-container *ngIf="level.difficulty === 'medium'">NORMAL</ng-container>
        <ng-container *ngIf="level.difficulty === 'hard'">SCHWER</ng-container>
      </span>
    </div>
  </section>

  <!-- WORK AREA -->
  <section class="level-work">

    <!-- CODE -->
    <app-code-editor
      *ngIf="level.mode === 'code'"
      [code]="userCode"
      (codeChange)="userCode = $event">
    </app-code-editor>

    <!-- BLOCKS -->
    <app-block-editor
      *ngIf="level.mode === 'blocks'"
      [blocks]="level.starterBlocks ?? []"
      (codeChange)="userCode = $event">
    </app-block-editor>

    <!-- MATHEMATICS -->
    <div *ngIf="level.mode === 'mathematics'" class="mathematics-input">

      <!-- Freitext-Eingabe (kein choices) -->
      <ng-container *ngIf="!level.choices?.length">
        <label class="math-label">Deine Antwort:</label>
        <input
          type="text"
          class="form-control math-answer-input"
          [(ngModel)]="userCode"
          placeholder="Gib deine Antwort ein…"
          (keydown.enter)="submit()">
      </ng-container>

      <!-- Auswahl (choices vorhanden) -->
      <ng-container *ngIf="level.choices?.length">
        <label class="math-label">Wähle die richtige Antwort:</label>
        <div class="math-choices">
          <button
            *ngFor="let choice of level.choices"
            class="btn math-choice-btn"
            [class.selected]="userCode === choice"
            (click)="userCode = choice">
            {{ choice }}
          </button>
        </div>
      </ng-container>

    </div>

  </section>

  <!-- SUPPORT -->
  <section class="level-support">

    <div class="hints" *ngIf="level.hints?.length">
      <button class="btn btn-sm btn-outline-secondary"
              (click)="showHint()">
        💡 Hinweis
      </button>

      <div *ngFor="let i of usedHints" class="hint">
        {{ level.hints![i].text }}
      </div>
    </div>
  </section>

  <!-- ACTION BAR -->
  <section class="level-actions">
    <button class="btn btn-secondary" (click)="reset()">
      Zurücksetzen
    </button>

    <button class="btn btn-primary" (click)="submit()">
      Prüfen
    </button>
  </section>
</div>
