<app-breadcrumb [breadcrumbs]="[
  { label: 'Dashboard', url: '/home' },
  { label: 'Level' }
]"></app-breadcrumb>

<!-- Loading -->
<div *ngIf="loading" class="text-muted">
  Lade Level...
</div>

<div *ngIf="!loading && level" class="level-layout">

  <!-- ── HEADER ────────────────────────────────────────────── -->
  <section class="level-header">
    <div class="header-main">
      <div class="header-text">

        <!-- Mode icon -->
        <span class="header-icon">
          <ng-container *ngIf="level.mode === 'mathematics'">🧮</ng-container>
          <ng-container *ngIf="level.mode === 'code'">💻</ng-container>
          <ng-container *ngIf="level.mode === 'blocks'">🧩</ng-container>
        </span>

        <h2 class="title">{{ level.title }}</h2>

        <!-- Task box — prominent task display -->
        <div class="task-box">
          <span class="task-label">Aufgabe</span>
          <span class="task-text">{{ level.description }}</span>
        </div>

      </div>

      <!-- Difficulty + XP -->
      <div style="display:flex; flex-direction:column; align-items:flex-end; gap:8px;">
        <span class="difficulty" [ngClass]="level.difficulty">
          <ng-container *ngIf="level.difficulty === 'easy'">⭐ Leicht</ng-container>
          <ng-container *ngIf="level.difficulty === 'medium'">⭐⭐ Normal</ng-container>
          <ng-container *ngIf="level.difficulty === 'hard'">⭐⭐⭐ Schwer</ng-container>
        </span>

      </div>
    </div>
  </section>

  <!-- ── WORK AREA ─────────────────────────────────────────── -->
  <section class="level-work">

    <!-- CODE -->
    <app-code-editor
      *ngIf="level.mode === 'code'"
      [code]="userCode"
      (codeChange)="userCode = $event">
    </app-code-editor>

    <!-- BLOCKS -->
    <app-block-editor
      *ngIf="level.mode === 'blocks'"
      [blocks]="level.starterBlocks ?? []"
      (codeChange)="userCode = $event">
    </app-block-editor>

    <!-- MATHEMATICS -->
    <div *ngIf="level.mode === 'mathematics'" class="mathematics-input">

      <!-- Freitext -->
      <ng-container *ngIf="!level.choices?.length">
        <label class="math-label">✏️ &nbsp;Deine Antwort:</label>
        <input
          type="text"
          class="math-answer-input"
          [(ngModel)]="userCode"
          placeholder="Hier eingeben…"
          autocomplete="off"
          (keydown.enter)="submit()">
      </ng-container>

      <!-- Auswahl-Buttons -->
      <ng-container *ngIf="level.choices?.length">
        <label class="math-label">👇 &nbsp;Wähle die richtige Antwort:</label>
        <div class="math-choices">
          <button
            *ngFor="let choice of level.choices"
            class="math-choice-btn"
            [class.selected]="userCode === choice"
            (click)="userCode = choice">
            {{ choice }}
          </button>
        </div>
      </ng-container>

    </div>

  </section>

  <!-- ── FEEDBACK ───────────────────────────────────────────── -->
  <div *ngIf="feedback" class="feedback"
       [class.feedback-success]="!submitting && userProgress && feedback.includes('Super')"
       [class.feedback-error]="!submitting && feedback && !feedback.includes('Super')">
    <span>{{ feedback }}</span>
  </div>

  <!-- ── HINTS ─────────────────────────────────────────────── -->
  <section class="level-support">
    <div class="hints" *ngIf="level.hints?.length">

      <button class="btn-hint" (click)="showHint()"
              *ngIf="usedHints.length < (level.hints?.length ?? 0)">
        <span class="hint-icon">💡</span>
        Hinweis anzeigen
        <span style="opacity:.5; font-size:.8em;">({{ usedHints.length }}/{{ level.hints!.length }})</span>
      </button>

      <div *ngFor="let i of usedHints" class="hint">
        {{ level.hints![i].text }}
      </div>

    </div>
  </section>

  <!-- ── ACTION BAR ─────────────────────────────────────────── -->
  <section class="level-actions">
    <button class="btn-reset" (click)="reset()">
      🔄 Zurücksetzen
    </button>

    <button class="btn-submit" (click)="submit()" [disabled]="submitting || !userCode">
      <ng-container *ngIf="!submitting">Antwort prüfen 🚀</ng-container>
      <ng-container *ngIf="submitting">Wird geprüft…</ng-container>
    </button>
  </section>

</div>
